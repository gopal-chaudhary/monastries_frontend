<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sikkim Monastery Explorer</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Store the path and redirect to index.html
    (function() {
      var pathSegmentsToKeep = 1;
      var l = window.location;
      
      sessionStorage.redirect = l.href;
      
      var indexPath = l.pathname.split('/').slice(0, pathSegmentsToKeep + 1).join('/') + '/';
      l.replace(indexPath);
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
